name: Deploy Preview (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Frontend Preview to Vercel
        id: deploy-vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--env NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_PREVIEW_URL }}'
          working-directory: frontend
      
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🚀 Preview Deployment
            
            Your preview deployment is ready!
            
            ### 🎨 Frontend
            **URL**: ${{ steps.deploy-vercel.outputs.preview-url }}
            
            ### ⚙️ Backend
            **URL**: ${{ secrets.BACKEND_PREVIEW_URL }}
            
            ### 📝 Details
            - **Commit**: ${{ github.event.pull_request.head.sha }}
            - **Branch**: ${{ github.event.pull_request.head.ref }}
            - **Author**: @${{ github.event.pull_request.user.login }}
            
            ---
            
            *Preview automatically updates on new commits to this PR*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Run smoke tests on preview
        run: |
          echo "Running smoke tests on preview environment..."
          curl -f ${{ steps.deploy-vercel.outputs.preview-url }} || exit 1
          curl -f ${{ secrets.BACKEND_PREVIEW_URL }}/api/health || exit 1
        continue-on-error: true
