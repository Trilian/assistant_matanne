name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: assistant_matanne_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/
      
      - name: Run formatter check (black)
        run: |
          pip install black
          black --check src/ tests/
      
      - name: Run type checker (mypy)
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports
        continue-on-error: true  # Mypy en mode permissif pour éviter de bloquer CI
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/assistant_matanne_test
          ENVIRONMENT: test
          JWT_SECRET: test_secret_key_for_ci
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term -v
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true  # Ne pas bloquer si Codecov échoue
      
      - name: Test coverage report
        run: |
          coverage report --fail-under=70
