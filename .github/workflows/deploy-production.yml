name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Déclenchement manual depuis GitHub UI

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: assistant-matanne-backend
        continue-on-error: false
      
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python manage.py migrate
        continue-on-error: true  # En cas d'échec migration, ne pas bloquer

      - name: Health check backend
        # Attend que Railway redémarre le service (max 60s), puis vérifie /health
        env:
          RAILWAY_PRODUCTION_URL: ${{ secrets.RAILWAY_PRODUCTION_URL }}
        run: |
          echo "⏳ Attente démarrage Railway (30s)..."
          sleep 30
          echo "🔍 Vérification santé backend..."
          STATUS=$(curl --silent --retry 5 --retry-delay 10 --retry-connrefused \
            --max-time 15 \
            "${RAILWAY_PRODUCTION_URL}/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
          echo "Status: $STATUS"
          if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ]; then
            echo "✅ Backend opérationnel (status: $STATUS)"
          else
            echo "❌ Backend non opérationnel (status: $STATUS)"
            echo "⚠️  Railway Free ne supporte pas le rollback automatique."
            echo "    Rollback manuel: connectez-vous à railway.app → projet → déploiements → revenir à la version précédente."
            exit 1
          fi
  
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend  # Attendre que le backend soit déployé et sain
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: frontend

      - name: Health check frontend
        # Vérifie que le frontend répond (HTTP 200) après déploiement
        run: |
          FRONTEND_URL="${{ steps.vercel-deploy.outputs.preview-url }}"
          if [ -z "$FRONTEND_URL" ] && [ -n "${{ secrets.VERCEL_PRODUCTION_URL }}" ]; then
            FRONTEND_URL="${{ secrets.VERCEL_PRODUCTION_URL }}"
          fi
          if [ -z "$FRONTEND_URL" ]; then
            echo "⚠️ URL frontend non disponible — vérification ignorée"
            exit 0
          fi
          echo "🔍 Vérification frontend: $FRONTEND_URL"
          HTTP_CODE=$(curl --silent --retry 3 --retry-delay 10 \
            --max-time 20 --output /dev/null --write-out "%{http_code}" \
            "$FRONTEND_URL" || echo "000")
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
            echo "✅ Frontend opérationnel (HTTP $HTTP_CODE)"
          else
            echo "❌ Frontend non opérationnel (HTTP $HTTP_CODE)"
            echo "🔄 Rollback Vercel automatique..."
            npm install -g vercel
            vercel rollback --token ${{ secrets.VERCEL_TOKEN }} || echo "Rollback Vercel: vérifiez manuellement sur vercel.com"
            exit 1
          fi
  
  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: Notify Telegram on failure
        if: ${{ needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MESSAGE="❌ Déploiement production ÉCHOUÉ%0ACommit: ${{ github.event.head_commit.message }}%0AAuteur: ${{ github.actor }}%0AAction requise: vérifier Railway/Vercel et rollback si nécessaire"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MESSAGE}" > /dev/null
          fi

      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Production deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production deployment *${{ job.status }}*\n*Commit*: ${{ github.event.head_commit.message }}\n*Author*: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
